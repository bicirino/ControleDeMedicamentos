
# Esse arquivo define a pipeline para o projeto de Integração Contínua (CI) usando a ferramenta GitHub Actions; 
# O arquivo é responsável por configurar os jobs/tarefas que serão executados automaticamente toda vez que um push ou pull for feito na branch main do repositório; 

# No caso deste arquivo, ele define duas tarefas principais: 
    # 1. Linting com Flake8: Verificará se o código segue as boas práticas de estilo e qualidade, garantindo que o código esteja no formato correto; 
    # 2. Testes com Pytest: Executará automaticamente os testes definidos na pasta tests/ para garantir que as funções principais do projeto estejam funcionando corretamente;

# ─────────────────────────────────────────────────────────────────────────────

name: CI   # Nome do workflow. 

# ─────────────────────────────────────────────────────────────────────────────
# GATILHOS (on):
#   Define quando este workflow será executado.
#   - push na branch main: toda vez que um commit for enviado para a main
#   - pull_request na branch main: toda vez que um PR for aberto para a main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────
  # JOB 1.
  # ───────────────────────────────────────────
  lint:
    name: Linting (Flake8)
    runs-on: ubuntu-latest  # Máquina virtual Linux fornecida pelo GitHub

    steps:
      # Passo 1: Baixa o código do repositório para a máquina virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Instala a versão correta do Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Passo 3: Instala as dependências listadas no requirements.txt
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Passo 4: Roda o Flake8 em todos os arquivos .py do projeto
      - name: Rodar Flake8
        run: |
          flake8 . --max-line-length=79 --exclude=.git,__pycache__,.pytest_cache

  # ───────────────────────────────────────────
  # JOB 2. 
  # ───────────────────────────────────────────
  test:
    name: Testes (Pytest)
    runs-on: ubuntu-latest
    needs: lint  # Só executa se o job de lint passar — evita rodar testes em código com erros

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Roda o pytest com modo verbose (-v) para exibir cada teste individualmente
      - name: Rodar Pytest
        run: |
          python -m pytest tests/ -v